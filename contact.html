<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お問い合わせ | Iruk</title>
  <meta name="description" content="Irukへのお問い合わせフォーム。アプリへのご感想、ご要望、お仕事のご相談などお気軽にどうぞ。" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand">Iruk<span>.</span></a>
      <button class="nav-toggle" aria-label="メニュー">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">ホーム</a></li>
        <li><a href="apps.html">アプリ一覧</a></li>
        <li><a href="contact.html">お問い合わせ</a></li>
        <li><a href="https://x.com/pieefo" target="_blank" rel="noopener">X</a></li>
      </ul>
    </div>
  </header>

  <div class="container">
    <nav class="breadcrumb"><a href="index.html">ホーム</a> ／ お問い合わせ</nav>
  </div>

  <section class="section">
    <div class="container">
      <h1 class="section-title">お問い合わせ</h1>
      <p class="section-lead">アプリのご感想・ご要望、お仕事のご相談などお気軽にどうぞ。</p>

      <div class="form-card">
        <!--
          ▼▼ 送信先の設定が必要です ▼▼
          このフォームは Formspree（無料枠あり）を使う想定です。
          1. https://formspree.io で登録
          2. フォームを作成し、発行される ID を下の action の "your-id" と差し替えてください
             例: action="https://formspree.io/f/xrgabcde"
          ※ 設定するまで送信は動作しません。メールでの受付をご希望なら下部のメールリンクをご利用いただけます。
        -->
        <form action="https://formspree.io/f/your-id" method="POST">
          <div class="form-group">
            <label for="name">お名前 <span class="req">必須</span></label>
            <input type="text" id="name" name="name" required placeholder="山田 太郎" />
          </div>

          <div class="form-group">
            <label for="email">メールアドレス <span class="req">必須</span></label>
            <input type="email" id="email" name="email" required placeholder="you@example.com" />
          </div>

          <div class="form-group">
            <label for="subject">お問い合わせ種別</label>
            <select id="subject" name="subject">
              <option value="感想・要望">アプリの感想・要望</option>
              <option value="不具合報告">不具合の報告</option>
              <option value="仕事の相談">お仕事のご相談</option>
              <option value="その他">その他</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">メッセージ <span class="req">必須</span></label>
            <textarea id="message" name="message" rows="6" required placeholder="ご用件をご記入ください"></textarea>
          </div>

          <button type="submit" class="btn btn-primary">送信する</button>
          <p class="form-note" style="margin-top:16px;">
            送信いただいた内容には、いただいたメールアドレス宛にご返信します。
          </p>
        </form>

        <hr style="border:none; border-top:1px solid var(--border); margin:28px 0;" />
        <p class="form-note">
          フォームがうまく使えない場合は、X（旧Twitter）の
          <a href="https://x.com/pieefo" target="_blank" rel="noopener">@pieefo</a>
          へDMでもご連絡いただけます。
        </p>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <p class="copyright">© 2026 Iruk. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
